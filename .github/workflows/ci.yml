name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: false

      - name: Run tests
        run: go test -mod=vendor ./... -count=1

      - name: Build
        run: go build -mod=vendor -o ds2api-browser .
